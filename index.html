<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer Despliegue Automatizado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; opacity: 0.9; }
        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: #28a745;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Mi Primer Despliegue Automatizado</h1>
        <p>Este archivo fue verificado automáticamente por GitHub Actions.</p>
        <div class="badge">✅ CI/CD Activo</div>
    </div>
</body>
</html>
